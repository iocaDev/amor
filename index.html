<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>❤️Uma Pergunta Importante❤️ </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="particles-container"></div>

  <div class="card" id="main-card">
    <div class="emoji-row">❤️❤️❤️</div>
    <h1></h1>
    <p class="question">Quer sair comigo? 🥺</p>
    <div class="buttons">
      <button id="btn-sim" onclick="handleSim()">Sim ❤️</button>
      <button id="btn-nao" onmouseover="escapar(this)" ontouchstart="escapar(this)">Não 🙈</button>
    </div>
  </div>

  <div class="overlay" id="overlay-sim">
    <div class="final-message">
      <h1>Eu sabia! 🥰</h1>
      <p>Você fez a escolha certa 💕<br>Mal posso espera pra ti ve 🎉</p>
      <div class="emoji-big">🎈🎊🎈🎊🎈</div>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
